<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="archGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bgGrad)" stroke="url(#archGrad)" stroke-width="1.5" opacity="0.9"/>

  <!-- Arch shape (the core mark) -->
  <path d="M22 88 Q22 30 60 22 Q98 30 98 88" stroke="url(#archGrad)" stroke-width="7" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Base bar -->
  <line x1="16" y1="88" x2="104" y2="88" stroke="url(#archGrad)" stroke-width="5" stroke-linecap="round"/>

  <!-- Left pillar -->
  <line x1="22" y1="88" x2="22" y2="96" stroke="#6366f1" stroke-width="5" stroke-linecap="round"/>

  <!-- Right pillar -->
  <line x1="98" y1="88" x2="98" y2="96" stroke="#06b6d4" stroke-width="5" stroke-linecap="round"/>

  <!-- Circuit nodes on the arch -->
  <circle cx="60" cy="24" r="5" fill="#8b5cf6" filter="url(#glow)"/>
  <circle cx="33" cy="52" r="3.5" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="87" cy="52" r="3.5" fill="#06b6d4" filter="url(#glow)"/>
  <circle cx="22" cy="88" r="4.5" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="98" cy="88" r="4.5" fill="#06b6d4" filter="url(#glow)"/>

  <!-- Circuit connector lines -->
  <line x1="60" y1="24" x2="33" y2="52" stroke="#6366f1" stroke-width="1" opacity="0.5" stroke-dasharray="3,3"/>
  <line x1="60" y1="24" x2="87" y2="52" stroke="#06b6d4" stroke-width="1" opacity="0.5" stroke-dasharray="3,3"/>
  <line x1="33" y1="52" x2="22" y2="88" stroke="#6366f1" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="87" y1="52" x2="98" y2="88" stroke="#06b6d4" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
</svg>
